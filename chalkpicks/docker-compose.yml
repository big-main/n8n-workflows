version: "3.9"

services:
  app:
    build: .
    container_name: chalkpicks
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chalkpicks_data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/chalkpicks.db
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/stats')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  chalkpicks_data:
